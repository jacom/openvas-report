{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}OpenVAS Report Dashboard{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sarabun:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <nav class="navbar navbar-expand-lg app-navbar">
        <div class="container-xl">
            <a class="navbar-brand" href="{% url 'dashboard-index' %}">
                <i class="bi bi-shield-check"></i> OpenVAS Reports
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="{% url 'dashboard-organization' %}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-building"></i> หน่วยงาน
                </a>
                <a href="{% url 'dashboard-sync-gvm' %}" class="btn btn-outline-light btn-sm nav-upload-btn">
                    <i class="bi bi-arrow-repeat"></i> Sync from GVM
                </a>
                <a href="{% url 'dashboard-system' %}" class="btn btn-outline-light btn-sm" title="System Update">
                    <i class="bi bi-cloud-download"></i>
                </a>
                {% if user.is_authenticated %}
                <span class="text-light small"><i class="bi bi-person-circle"></i> {{ user.username }}</span>
                <a href="{% url 'dashboard-logout' %}" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container-xl mt-4 app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-5 app-footer">
        <small>OpenVAS Professional Report System</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="{% static 'js/charts.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
